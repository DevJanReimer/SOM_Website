<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <clipPath id="bowl">
      <circle cx="50" cy="50" r="26"/>
    </clipPath>
  </defs>
  <!-- C/crescent: outer circle minus inner circle via evenodd -->
  <path fill-rule="evenodd" fill="#1a3d2b" d="
    M 2 42 A 40 40 0 1 0 82 42 A 40 40 0 1 0 2 42 Z
    M 24 50 A 26 26 0 1 0 76 50 A 26 26 0 1 0 24 50 Z
  "/>
  <!-- Mountain peaks in the bowl -->
  <path d="M24 74 L40 48 L50 60 L62 36 L80 74Z" fill="#1a3d2b" clip-path="url(#bowl)"/>
  <!-- Leaf curl -->
  <path d="M50 24 C58 18 68 18 70 26" stroke="#0e2618" stroke-width="5" fill="none" stroke-linecap="round"/>
</svg>
